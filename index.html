<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Veyantra — Engineering Modern Digital Systems</title>

    <!-- SEO Meta Tags -->

    <meta name="keywords" content="Veyantra, technology, digital systems, engineering, SaaS, cybersecurity" />

    <!-- Open Graph -->
    <meta property="og:title" content="Veyantra — Engineering Modern Digital Systems" />
    <meta property="og:description"
        content="Launching soon. Veyantra is building the infrastructure for modern digital operations." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://veyantra.com" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Veyantra — Engineering Modern Digital Systems" />
    <meta name="twitter:description" content="Launching soon." />

    <!-- Favicon (inline SVG as data URI) -->
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpolygon points='50,10 90,35 90,65 50,90 10,65 10,35' fill='none' stroke='%23e2e8f0' stroke-width='6'/%3E%3Cpolygon points='50,25 75,40 75,60 50,75 25,60 25,40' fill='none' stroke='%23e2e8f0' stroke-width='4'/%3E%3C/svg%3E" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@300;400&display=swap"
        rel="stylesheet" />

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0B0B0C;
            --bg-2: #0f0f11;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.07);
            --text-primary: #f0f0f0;
            --text-secondary: rgba(240, 240, 240, 0.45);
            --text-muted: rgba(240, 240, 240, 0.25);
            --accent: #c8d0e0;
            --glow: rgba(180, 200, 230, 0.06);
            --font-main: 'DM Sans', sans-serif;
            --font-mono: 'DM Mono', monospace;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text-primary);
            font-family: var(--font-main);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── LOADING SCREEN ── */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-ring {
            width: 36px;
            height: 36px;
            border: 1.5px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── BACKGROUND ── */
        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* Radial glow */
        .bg-glow {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 700px;
            height: 700px;
            background: radial-gradient(ellipse at center,
                    rgba(160, 185, 220, 0.055) 0%,
                    rgba(120, 150, 200, 0.025) 40%,
                    transparent 70%);
            pointer-events: none;
        }

        /* Animated dot grid */
        #grid-canvas {
            position: absolute;
            inset: 0;
            opacity: 0.35;
        }

        /* Floating particles */
        #particles-canvas {
            position: absolute;
            inset: 0;
            opacity: 0.6;
        }

        /* ── MAIN LAYOUT ── */
        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
        }

        /* ── NAV ── */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 24px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            opacity: 0;
            animation: fadeDown 0.7s ease 1.2s forwards;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .nav-logo-mark {
            width: 22px;
            height: 22px;
            opacity: 0.85;
        }

        .nav-brand {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.08em;
            color: var(--text-primary);
            text-transform: uppercase;
        }

        .nav-status {
            display: flex;
            align-items: center;
            gap: 7px;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        .status-dot {
            width: 5px;
            height: 5px;
            background: #6ee7b7;
            border-radius: 50%;
            animation: pulse-dot 2.5s ease-in-out infinite;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.4;
                transform: scale(0.7);
            }
        }

        /* ── HERO ── */
        .hero {
            max-width: 680px;
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
        }

        /* Logo mark */
        .logo-container {
            opacity: 0;
            animation: fadeUp 0.8s ease 1.4s forwards;
        }

        .logo-svg {
            width: 64px;
            height: 64px;
            filter: drop-shadow(0 0 18px rgba(180, 200, 230, 0.18));
        }

        /* Pill badge */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 5px 14px 5px 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-family: var(--font-mono);
            font-size: 10.5px;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            text-transform: uppercase;
            opacity: 0;
            animation: fadeUp 0.8s ease 1.6s forwards;
        }

        .badge-dot {
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0.7;
        }

        /* Heading */
        .heading {
            opacity: 0;
            animation: fadeUp 0.9s ease 1.8s forwards;
        }

        h1 {
            font-size: clamp(52px, 10vw, 88px);
            font-weight: 300;
            letter-spacing: -0.03em;
            line-height: 1;
            color: var(--text-primary);
        }

        h1 span {
            color: transparent;
            background: linear-gradient(135deg, #e8edf5 0%, #a0b4cc 100%);
            -webkit-background-clip: text;
            background-clip: text;
        }

        /* Subheading */
        .subheading {
            font-size: clamp(14px, 2vw, 16px);
            font-weight: 300;
            line-height: 1.7;
            color: var(--text-secondary);
            letter-spacing: 0.01em;
            max-width: 420px;
            opacity: 0;
            animation: fadeUp 0.9s ease 2.0s forwards;
        }

        /* Divider */
        .divider {
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            opacity: 0;
            animation: fadeUp 0.7s ease 2.1s forwards;
        }

        /* ── COUNTDOWN ── */
        .countdown-wrap {
            opacity: 0;
            animation: fadeUp 0.9s ease 2.2s forwards;
            width: 100%;
        }

        .countdown-label {
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.18em;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 20px;
            text-align: center;
        }

        .countdown {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: 8px;
        }

        .cd-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            min-width: 72px;
        }

        .cd-box {
            width: 100%;
            padding: 18px 12px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }

        .cd-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
        }

        .cd-number {
            font-family: var(--font-mono);
            font-size: clamp(26px, 5vw, 38px);
            font-weight: 300;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            line-height: 1;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .cd-number.tick {
            animation: numTick 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes numTick {
            0% {
                transform: translateY(-6px);
                opacity: 0.3;
            }

            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .cd-label {
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .cd-sep {
            font-family: var(--font-mono);
            font-size: 28px;
            font-weight: 200;
            color: var(--text-muted);
            opacity: 0.4;
            padding-top: 14px;
            line-height: 1;
        }

        /* ── EMAIL FORM ── */
        .notify-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            opacity: 0;
            animation: fadeUp 0.9s ease 2.4s forwards;
            width: 100%;
            max-width: 380px;
        }

        .notify-text {
            font-size: 12px;
            font-weight: 300;
            color: var(--text-muted);
            letter-spacing: 0.04em;
        }

        .notify-form {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .notify-input {
            flex: 1;
            padding: 11px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: 13px;
            font-weight: 300;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .notify-input::placeholder {
            color: var(--text-muted);
        }

        .notify-input:focus {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .notify-btn {
            padding: 11px 18px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease;
            white-space: nowrap;
        }

        .notify-btn:hover {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.18);
        }

        .notify-btn:active {
            transform: scale(0.98);
        }

        .notify-success {
            font-family: var(--font-mono);
            font-size: 11px;
            color: #6ee7b7;
            letter-spacing: 0.05em;
            display: none;
        }

        /* ── FOOTER ── */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            opacity: 0;
            animation: fadeUp 0.7s ease 2.6s forwards;
        }

        .footer-copy {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 0.06em;
        }

        .footer-links {
            display: flex;
            gap: 20px;
        }

        .footer-link {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 0.06em;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer-link:hover {
            color: var(--text-secondary);
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(14px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            nav {
                padding: 20px 24px;
            }

            footer {
                padding: 20px 24px;
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            .footer-links {
                justify-content: center;
            }

            .cd-unit {
                min-width: 56px;
            }

            .cd-box {
                padding: 14px 8px 12px;
            }

            .notify-form {
                flex-direction: column;
            }

            h1 {
                letter-spacing: -0.02em;
            }
        }
    </style>
</head>

<body>

    <!-- Loader -->
    <div id="loader">
        <div class="loader-ring"></div>
    </div>

    <!-- Background -->
    <div class="bg-canvas">
        <canvas id="grid-canvas"></canvas>
        <canvas id="particles-canvas"></canvas>
        <div class="bg-glow"></div>
    </div>

    <!-- Navigation -->
    <nav>
        <a href="#" class="nav-logo">
            <!-- Inline SVG recreation of the V logo mark -->
            <svg class="nav-logo-mark" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Outer V shape -->
                <path d="M12 18 L50 70 L88 18" stroke="#d0d8e8" stroke-width="9" stroke-linecap="round"
                    stroke-linejoin="round" fill="none" />
                <!-- Left diamond -->
                <path d="M12 18 L31 44 L50 18 L31 -8" stroke="#d0d8e8" stroke-width="7" stroke-linecap="round"
                    stroke-linejoin="round" fill="none" />
                <!-- Right diamond -->
                <path d="M88 18 L69 44 L50 18 L69 -8" stroke="#d0d8e8" stroke-width="7" stroke-linecap="round"
                    stroke-linejoin="round" fill="none" />
                <!-- Bottom triangle detail -->
                <path d="M31 44 L50 70 L69 44 L50 18 Z" stroke="#d0d8e8" stroke-width="6" stroke-linejoin="round"
                    fill="none" />
            </svg>
            <span class="nav-brand">Veyantra</span>
        </a>
        <div class="nav-status">
            <span class="status-dot"></span>

        </div>
    </nav>

    <!-- Main Content -->
    <main class="page">
        <div class="hero">

            <!-- Logo mark -->
            <div class="logo-container">
                <svg class="logo-svg" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Outer V -->
                    <path d="M14 22 L60 86 L106 22" stroke="url(#lg1)" stroke-width="8" stroke-linecap="round"
                        stroke-linejoin="round" fill="none" />
                    <!-- Left rhombus arm -->
                    <path d="M14 22 L37 54 L60 22 L37 -10" stroke="url(#lg2)" stroke-width="6.5" stroke-linecap="round"
                        stroke-linejoin="round" fill="none" />
                    <!-- Right rhombus arm -->
                    <path d="M106 22 L83 54 L60 22 L83 -10" stroke="url(#lg2)" stroke-width="6.5" stroke-linecap="round"
                        stroke-linejoin="round" fill="none" />
                    <!-- Center diamond -->
                    <path d="M37 54 L60 86 L83 54 L60 22 Z" stroke="url(#lg3)" stroke-width="5.5"
                        stroke-linejoin="round" fill="none" />
                    <defs>
                        <linearGradient id="lg1" x1="14" y1="22" x2="106" y2="86" gradientUnits="userSpaceOnUse">
                            <stop offset="0%" stop-color="#e2e8f0" />
                            <stop offset="100%" stop-color="#94a3b8" />
                        </linearGradient>
                        <linearGradient id="lg2" x1="14" y1="-10" x2="106" y2="54" gradientUnits="userSpaceOnUse">
                            <stop offset="0%" stop-color="#cbd5e1" />
                            <stop offset="100%" stop-color="#7a8fa8" />
                        </linearGradient>
                        <linearGradient id="lg3" x1="37" y1="22" x2="83" y2="86" gradientUnits="userSpaceOnUse">
                            <stop offset="0%" stop-color="#d1dae8" />
                            <stop offset="100%" stop-color="#8898b0" />
                        </linearGradient>
                    </defs>
                </svg>
            </div>

            <!-- Badge -->
            <div class="badge">
                <span class="badge-dot"></span>
                Launching soon
            </div>

            <!-- Heading -->
            <div class="heading">
                <h1><span>Veyantra</span></h1>
            </div>

            <!-- Subheading -->
            <p class="subheading">
                Engineering modern digital systems.
            </p>

            <div class="divider"></div>

            <!-- Countdown -->
            <div class="countdown-wrap">
                <div class="countdown-label">Time remaining</div>
                <div class="countdown">
                    <div class="cd-unit">
                        <div class="cd-box">
                            <div class="cd-number" id="cd-days">00</div>
                        </div>
                        <span class="cd-label">Days</span>
                    </div>
                    <div class="cd-sep">:</div>
                    <div class="cd-unit">
                        <div class="cd-box">
                            <div class="cd-number" id="cd-hours">00</div>
                        </div>
                        <span class="cd-label">Hours</span>
                    </div>
                    <div class="cd-sep">:</div>
                    <div class="cd-unit">
                        <div class="cd-box">
                            <div class="cd-number" id="cd-mins">00</div>
                        </div>
                        <span class="cd-label">Minutes</span>
                    </div>
                    <div class="cd-sep">:</div>
                    <div class="cd-unit">
                        <div class="cd-box">
                            <div class="cd-number" id="cd-secs">00</div>
                        </div>

                    </div>
                </div>
            </div>

            <!-- Notify -->
            <div class="notify-section">
                <p class="notify-text">Get notified on launch day.</p>
                <div class="notify-form">
                    <input class="notify-input" type="email" id="email-input" placeholder="your@email.com"
                        autocomplete="email" />
                    <button class="notify-btn" onclick="handleNotify()">Notify me</button>

                <span class="notify-success" id="notify-success">✓ You're on the list.</span>

        </div>

    <!-- Footer -->
    <footer>
        <span class="footer-copy">© 2026 Veyantra. All rights reserved.</span>
        <div class="footer-links">
            <a href="#" class="footer-link">Privacy</a>
            <a href="#" class="footer-link">Contact</a>
        </div>
    </footer>

    <script>
        /* ── LOADER ── */
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
            }, 900);
        });

        /* ── COUNTDOWN ── */
        // Target: May 14, 2026 7:15 AM IST (UTC+5:30 → UTC: May 14 01:45 UTC)
        const target = new Date('2026-05-20T02:30:00Z');

        function pad(n) { return String(n).padStart(2, '0'); }

        function tick(id, val) {
            const el = document.getElementById(id);
            const next = pad(val);
            if (el.textContent !== next) {
                el.classList.remove('tick');
                void el.offsetWidth; // reflow
                el.classList.add('tick');
                el.textContent = next;
            }
        }

        function updateCountdown() {
            const now = new Date();
            const diff = target - now;

            if (diff <= 0) {
                ['cd-days', 'cd-hours', 'cd-mins', 'cd-secs'].forEach(id => {
                    document.getElementById(id).textContent = '00';
                });
                return;
            }

            const days = Math.floor(diff / 86400000);
            const hours = Math.floor((diff % 86400000) / 3600000);
            const mins = Math.floor((diff % 3600000) / 60000);
            const secs = Math.floor((diff % 60000) / 1000);

            tick('cd-days', days);
            tick('cd-hours', hours);
            tick('cd-mins', mins);
            tick('cd-secs', secs);
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);

        /* ── EMAIL NOTIFY ── */
        function handleNotify() {
            const input = document.getElementById('email-input');
            const success = document.getElementById('notify-success');
            const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!emailRe.test(input.value)) {
                input.style.borderColor = 'rgba(248,113,113,0.4)';
                setTimeout(() => { input.style.borderColor = ''; }, 1500);
                return;
            }

            input.style.display = 'none';
            document.querySelector('.notify-btn').style.display = 'none';
            success.style.display = 'inline';
        }

        /* ── DOT GRID ── */
        (function initGrid() {
            const canvas = document.getElementById('grid-canvas');
            const ctx = canvas.getContext('2d');
            let W, H;

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
                draw();
            }

            function draw() {
                ctx.clearRect(0, 0, W, H);
                const gap = 36;
                const r = 1;
                ctx.fillStyle = 'rgba(200, 210, 230, 0.18)';

                for (let x = gap / 2; x < W; x += gap) {
                    for (let y = gap / 2; y < H; y += gap) {
                        // Distance from center for fade
                        const dx = x - W / 2;
                        const dy = y - H * 0.38;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const maxD = Math.sqrt((W / 2) ** 2 + (H / 2) ** 2);
                        const alpha = Math.max(0, 0.22 - (dist / maxD) * 0.22);

                        ctx.globalAlpha = alpha;
                        ctx.beginPath();
                        ctx.arc(x, y, r, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                ctx.globalAlpha = 1;
            }

            window.addEventListener('resize', resize);
            resize();
        })();

        /* ── FLOATING PARTICLES ── */
        (function initParticles() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let W, H;
            const particles = [];
            const COUNT = 28;

            class Particle {
                constructor() { this.reset(true); }
                reset(rand) {
                    this.x = Math.random() * (W || window.innerWidth);
                    this.y = rand ? Math.random() * (H || window.innerHeight) : (H || window.innerHeight) + 10;
                    this.r = Math.random() * 1.2 + 0.3;
                    this.vy = -(Math.random() * 0.25 + 0.05);
                    this.vx = (Math.random() - 0.5) * 0.1;
                    this.alpha = Math.random() * 0.35 + 0.05;
                    this.life = 0;
                    this.maxLife = Math.random() * 300 + 200;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.life++;
                    if (this.y < -10 || this.life > this.maxLife) this.reset(false);
                }
                draw() {
                    const fade = this.life < 60 ? this.life / 60 : this.life > this.maxLife - 60 ? (this.maxLife - this.life) / 60 : 1;
                    ctx.globalAlpha = this.alpha * fade;
                    ctx.fillStyle = '#c8d5e8';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }

            function init() {
                for (let i = 0; i < COUNT; i++) particles.push(new Particle());
            }

            function loop() {
                ctx.clearRect(0, 0, W, H);
                particles.forEach(p => { p.update(); p.draw(); });
                ctx.globalAlpha = 1;
                requestAnimationFrame(loop);
            }

            window.addEventListener('resize', resize);
            resize();
            init();
            loop();
        })();
    </script>
</body>

</html>
